<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="images/golden-retriever.png" type="image/x-icon">
    <title>Alpaca Generator</title>
</head>

<body>

    <main class="container main">
        <section class="intro">
            <h1 class="title">Alpaca Generator</h1>
            <p class="description">
                Create your own unique alpaca by customizing its features and accessories. 
            </p>
        </section>

        <section class="generator">
        <div class="preview-col">
            <div class="alpaca-stage" id="alpacaStage"></div>

            <div class="actions">
                <button id="randomBtn" class="btn btn-secondary" type="button">
                    <span class="icon">🎲</span> Random
                </button>
                <button id="downloadBtn" class="btn btn-primary" type="button">
                    <span class="icon">⬇</span> Download
                </button>
            </div>
        </div>

        <div class="panel-col">
            <div class="panel-section">
                <h3 class="panel-title">Accessorize the alpaca</h3>
                <div class="chip-row" id="categoryRow"></div>
            </div>
            <div class="panel-section">
                <h3 class="panel-title">Style</h3>
                <div class="chip-row" id="variantRow"></div>
            </div>
        </div>
    </section>

    </main>
    
    <script src="script.js"></script>
</body>

</html>
